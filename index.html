<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/index.css">
    <title>AniTox | Official</title>
</head>
<body>

    <header class="main-header">
        <div class="logo"><span class="red-text">Ani</span>Tox</div>
        <nav class="desktop-nav">
            <a href="javascript:void(0)" onclick="home()">Home</a>
            <a href="javascript:void(0)" onclick="searchAnim()">Search</a>
            <a href="javascript:void(0)" onclick="help()">Help</a>
        </nav>
    </header>
            <!-- home -->
    <div class="container">
        <section id="home">
            <h1 class="section-title">Top <span class="red-text">Anime</span></h1>
            <div id="top-anime-grid" class="anime-grid"></div>
        </section>
            <!-- search -->
        <section id="search" hidden>
            <div class="search-container">
                <div class="search-bar">
                    <input type="text" id="query_search" placeholder="Search anime names...">
                    <button id="done">🔍</button>
                </div>
            </div>
            <div id="search-anime-grid" class="anime-grid"></div>
        </section>
        <!-- details -->
        <div id="details" class="details-view" hidden>
            <div class="back-nav">
                <button onclick="home()" class="back-btn">← Back to Home</button>
            </div>
            <p id="anime-rating"></p>
            <main id="details-content" class="details-container">
            </main>

            <div class="overview-container">
                <h3>Overview:</h3>
                <div class="scroll-box">
                    <p id="anime-synopsis">
                        the greatest treasure in the world, One Piece... [long text here]
                    </p>
                </div>
            </div>
        </div>

        <!-- player -->
            <div id="player-view" hidden>
                <h2 id="now-watching-title">Select an Episode</h2>
                
                <div class="video-wrapper">
                    <iframe 
                        id="anime-player" 
                        src="" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                    </iframe>
                </div>

                <div id="episode-list"></div>
            </div>
        <!-- player -->


        <section id="help" hidden>
            <div class="help-content">
                <h2>Help <span class="red-text">Center</span></h2>
                <p>This Website Uses API to show all content on the Page <br> API USED: Jikan API</p>
                
                <br>
                <h2>Anime <span class="red-text">Schedule</span></h2>
                
                <div class="schedule-tabs">
                    <button onclick="loadSchedule('monday')">Mon</button>
                    <button onclick="loadSchedule('tuesday')">Tue</button>
                    <button onclick="loadSchedule('wednesday')">Wed</button>
                    <button onclick="loadSchedule('thursday')">Thu</button>
                    <button onclick="loadSchedule('friday')">Fri</button>
                    <button onclick="loadSchedule('saturday')">Sat</button>
                    <button onclick="loadSchedule('sunday')">Sun</button>
                </div>

                <div id="schedule-grid">
                    <table class="schedule-table">
                        <tbody id="schedule-body"></tbody>
                    </table>
                </div>
            </div>
        </section>

    </div>

    <nav class="bottom-nav">
        <a href="javascript:void(0)" onclick="home()">🏠<span>Home</span></a>
        <a href="javascript:void(0)" onclick="searchAnim()">🔍<span>Search</span></a>
        <a href="javascript:void(0)" onclick="help()">❓<span>Help</span></a>
    </nav>

    <script src="src/main.js"></script>
</body>
</html>
